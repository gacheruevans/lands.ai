services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lands_ai_postgres
    environment:
      POSTGRES_DB: lands_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - lands_ai_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lands_ai"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - lands_ai_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lands_ai_backend
    environment:
      APP_NAME: lands.ai backend
      APP_VERSION: 0.1.0
      API_PREFIX: /api/v1
      DEFAULT_LLM_PROVIDER: openai-compatible
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      CHAT_MODEL: ${CHAT_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-4}
      RETRIEVAL_CANDIDATE_POOL: ${RETRIEVAL_CANDIDATE_POOL:-12}
      MIN_CITATION_SCORE: ${MIN_CITATION_SCORE:-0.48}
      MIN_ANSWER_CONFIDENCE: ${MIN_ANSWER_CONFIDENCE:-0.60}
      MIN_CITATIONS_REQUIRED: ${MIN_CITATIONS_REQUIRED:-1}
      ENABLE_ONLINE_RESEARCH: ${ENABLE_ONLINE_RESEARCH:-true}
      ONLINE_RESEARCH_MAX_DOCS: ${ONLINE_RESEARCH_MAX_DOCS:-3}
      ONLINE_RESEARCH_MIN_RELEVANCE_SCORE: ${ONLINE_RESEARCH_MIN_RELEVANCE_SCORE:-0.28}
      ONLINE_RESEARCH_QUERY_SUFFIX: ${ONLINE_RESEARCH_QUERY_SUFFIX:-Kenya land property}
      ONLINE_RESEARCH_USER_AGENT: ${ONLINE_RESEARCH_USER_AGENT:-lands.ai/0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lands_ai
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lands_ai_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lands_ai_frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - lands_ai_net

  redis:
    image: redis:7-alpine
    container_name: lands_ai_redis
    ports:
      - "6379:6379"
    networks:
      - lands_ai_net

volumes:
  lands_ai_pgdata:

networks:
  lands_ai_net:
    name: lands_ai_net
