services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lands_ai_postgres
    environment:
      POSTGRES_DB: lands_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - lands_ai_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lands_ai"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - lands_ai_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lands_ai_backend
    environment:
      APP_NAME: lands.ai backend
      APP_VERSION: 0.1.0
      API_PREFIX: /api/v1
      DEFAULT_LLM_PROVIDER: openai-compatible
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      CHAT_MODEL: ${CHAT_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/lands_ai
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lands_ai_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lands_ai_frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - lands_ai_net

  redis:
    image: redis:7-alpine
    container_name: lands_ai_redis
    ports:
      - "6379:6379"
    networks:
      - lands_ai_net

volumes:
  lands_ai_pgdata:

networks:
  lands_ai_net:
    name: lands_ai_net
